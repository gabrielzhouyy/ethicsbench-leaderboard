# Auto-generated from scenario.toml

services:
  green-agent:
    image: ghcr.io/gabrielzhouyy/ethics_bench:latest
    platform: linux/amd64
    container_name: green-agent
    command: ["python", "-m", "src.green_agent.green_server"]
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GREEN_AGENT_URL=http://green-agent:9009      # ← Add this
      - WHITE_AGENT_URL=http://white-agent:9009      # ← Add this
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:9009/.well-known/agent-card.json"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    depends_on:
      white_agent:
        condition: service_healthy
    networks:
      - agent-network

  white_agent:
    image: ghcr.io/gabrielzhouyy/white_agent:latest
    platform: linux/amd64
    container_name: white_agent
    command: ["python", "-m", "src.white_agent.agent"]
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - WHITE_AGENT_URL=http://white-agent:9009      # ← Add this
      - GREEN_AGENT_URL=http://green-agent:9009      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:9009/.well-known/agent-card.json"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - agent-network

  agentbeats-client:
    image: ghcr.io/agentbeats/agentbeats-client:v1.0.0
    platform: linux/amd64
    container_name: agentbeats-client
    volumes:
      - ./a2a-scenario.toml:/app/scenario.toml
      - ./output:/app/output
    command: ["scenario.toml", "output/results.json"]
    depends_on:
      green-agent:
        condition: service_healthy
      white_agent:
        condition: service_healthy
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
